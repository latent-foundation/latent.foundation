<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="latent. — a quiet systems laboratory for software projects, research tooling, and long-term experiments." />
    <meta property="og:title" content="latent." />
    <meta property="og:description" content="quiet systems / hidden structure" />
    <meta property="og:type" content="website" />
    <title>latent.</title>
    <link rel="icon" type="image/svg+xml" href="/assets/latent-mark-dark.svg" />

    <!-- Prevent flash of wrong theme by reading localStorage before WASM loads -->
    <script>
      (function () {
        var saved = localStorage.getItem("latent-theme");
        var theme =
          saved ||
          (window.matchMedia("(prefers-color-scheme: light)").matches
            ? "light"
            : "dark");
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>

    <!-- Brand atoms + shared component styles from the latent-design submodule,
         then this site's own page styles. Order matters for the cascade. -->
    <link data-trunk rel="css" href="vendor/latent-design/tokens.css" />
    <link data-trunk rel="css" href="vendor/latent-design/components.css" />
    <link data-trunk rel="css" href="style/app.css" />
    <link data-trunk rel="copy-dir" href="vendor/latent-design/fonts" />
    <link data-trunk rel="copy-dir" href="vendor/latent-design/assets" />
    <link data-trunk rel="copy-file" href="_redirects" />
  </head>
  <body></body>
</html>
